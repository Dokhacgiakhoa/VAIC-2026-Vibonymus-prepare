name: Rebuild competitors index

on:
  push:
    branches: [main]
    paths:
      - 'data/scrapes/**'
      - '!data/scrapes/latest.json'
      - '!data/scrapes/CHANGELOG.md'

permissions:
  contents: write

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # scripts/rebuild-index.mjs chỉ dùng Node builtin (fs/path), không cần npm install.
      - name: Rebuild latest.json / CHANGELOG.md / competitors-data.json
        run: node scripts/rebuild-index.mjs

      - name: Commit & push nếu có thay đổi
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scrapes/latest.json data/scrapes/CHANGELOG.md src/data/competitors-data.json
          if git diff --cached --quiet; then
            echo "Không có gì thay đổi, bỏ qua commit."
          else
            git commit -m "chore: rebuild competitors index [skip ci]"
            git push
          fi
