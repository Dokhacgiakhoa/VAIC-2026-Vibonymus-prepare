<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <title>VAIC Competitors Scraper</title>
    <style>
      body {
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        width: 320px;
        padding: 16px;
        margin: 0;
      }
      h1 {
        font-size: 13px;
        font-weight: 700;
        margin: 0 0 12px;
        color: #333;
      }
      button {
        width: 100%;
        padding: 10px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        border-radius: 8px;
        border: none;
        background: #5a49cc;
        color: white;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #status {
        margin-top: 12px;
        font-size: 12px;
        color: #444;
        white-space: pre-wrap;
        line-height: 1.5;
      }
      #status.error {
        color: #c0392b;
      }
      #status.done {
        color: #1e8449;
      }
    </style>
  </head>
  <body>
    <h1>Cào dữ liệu đối thủ VAIC 2026</h1>
    <button id="start">Cào dữ liệu</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
